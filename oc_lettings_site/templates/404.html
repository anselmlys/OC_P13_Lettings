{% extends "oc_lettings_site/base.html" %}
{% block title %}Error 404{% endblock title %}

{% block content %}


<div class="container px-5 py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="page-header-ui-title mb-3 display-6">404</h1>
        </div>
    </div>
</div>


<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h2>The page you are looking for cannot be found</h2>
        </div>
    </div>
</div>


<div class="container px-5 py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h5>Possible reasons</h5>
            <ul>
                <li>The address may have been typed incorrectly</li>
                <li>It may be a broken or outdated link</li>
            </ul>
        </div>
    </div>
</div>


<div class="container px-5 py-5 text-center">
    <div class="justify-content-center">
        <a class="btn fw-500 btn-primary px-10" href="{% url 'index' %}">
            Back
        </a>
    </div>
</div>

{% endblock %}
